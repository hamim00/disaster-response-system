services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: disaster_postgres
    environment:
      POSTGRES_DB: disaster_response
      POSTGRES_USER: disaster_admin
      POSTGRES_PASSWORD: disaster123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    networks:
      - disaster_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disaster_admin -d disaster_response"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: disaster_redis
    ports:
      - "6379:6379"
    networks:
      - disaster_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent1_environmental
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./src:/app/src
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8001:8001"
    networks:
      - disaster_network
    restart: unless-stopped

  agent2:
    build:
      context: .
      dockerfile: src/agents/agent_2_distress_intelligence/Dockerfile
    container_name: agent2_distress_intelligence
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - AGENT1_URL=http://agent1:8001
      - AGENT3_URL=http://agent3:8003
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    ports:
      - "8002:8002"
    networks:
      - disaster_network
    restart: unless-stopped

  agent3:
    build:
      context: .
      dockerfile: src/agents/agent_3_resource/Dockerfile
    container_name: agent3_resource_management
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://disaster_admin:disaster123@postgres:5432/disaster_response
      - REDIS_URL=redis://redis:6379
    ports:
      - "8003:8003"
    networks:
      - disaster_network
    restart: unless-stopped

  agent4:
    build:
      context: .
      dockerfile: src/agents/agent_4_dispatch/Dockerfile
    container_name: agent4_dispatch_optimization
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://disaster_admin:disaster123@postgres:5432/disaster_response
      - REDIS_URL=redis://redis:6379
    ports:
      - "8004:8004"
    networks:
      - disaster_network
    restart: unless-stopped

  # =====================================================
  # NEW: Scenario Feeder — auto-plays events into Redis
  # =====================================================
  scenario-feeder:
    build:
      context: ./scenario_feeder
      dockerfile: Dockerfile
    container_name: floodshield_feeder
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://disaster_admin:disaster123@postgres:5432/disaster_response
      - SCENARIO_FILE=/data/scenarios/sylhet_flood_2024.json
      - SPEED_MULTIPLIER=5
      - AUTO_START=false
      - FEEDER_PORT=8010
    volumes:
      - ./scenarios:/data/scenarios:ro
    ports:
      - "8010:8010"
    networks:
      - disaster_network
    restart: unless-stopped

  # =====================================================
  # NEW: Unified Backend — serves Gateway, Field, Command
  # =====================================================
  unified-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: floodshield_backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://disaster_admin:disaster123@postgres:5432/disaster_response
      - BACKEND_PORT=8000
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    networks:
      - disaster_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  disaster_network:
    driver: bridge
