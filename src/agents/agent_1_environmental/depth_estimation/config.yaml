# Configuration for Flood Depth Estimation System

# Predefined regions (Bangladesh)
regions:
  sylhet:
    - 91.8  # lon_min
    - 24.7  # lat_min
    - 92.2  # lon_max
    - 25.0  # lat_max
  
  dhaka:
    - 90.3
    - 23.7
    - 90.5
    - 23.9
  
  chittagong:
    - 91.7
    - 22.2
    - 92.0
    - 22.5

# Training parameters
training:
  start_date: '2022-05-01'
  end_date: '2022-09-30'
  n_train_samples: 80
  n_val_samples: 20
  patch_size: 32
  epochs: 20
  batch_size: 8
  learning_rate: 0.001

# Model configuration
model:
  max_depth: 5.0
  input_shape:
    - 128
    - 128
    - 2

# Thresholds
thresholds:
  flood_min_depth: 0.1
  severity_low: 1.0
  severity_medium: 2.0